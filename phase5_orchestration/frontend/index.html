<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FDA SafetyNet - Live Consumer Defense</title>
<style>
  :root {
    --bg:#f4f7fb; --panel:#ffffff; --panel2:#f8fafc; --line:#e2e8f0;
    --txt:#0f1a2e; --muted:#64748b; --soft:#94a3b8;
    --lethal:#e5484d; --moderate:#d97706; --minor:#2563eb; --accent:#2563eb; --ok:#16a34a;
    --shadow:0 4px 16px rgba(20,40,80,.07);
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); overflow:hidden;
         font-family:Inter,-apple-system,BlinkMacSystemFont,system-ui,sans-serif; }
  .app { display:grid; grid-template-rows:auto auto 1fr auto; height:100vh; }

  header { display:flex; align-items:center; gap:22px; padding:13px 24px;
           background:var(--panel); border-bottom:1px solid var(--line); }
  .logo { font-size:20px; font-weight:800; letter-spacing:-.01em; }
  .logo .shield { color:var(--accent); }
  .tagline { color:var(--muted); font-size:12px; margin-top:1px; }
  .stats { display:flex; gap:26px; margin-left:auto; }
  .stat .v { font-size:18px; font-weight:800; }
  .stat .l { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
  .run-btn { background:linear-gradient(135deg,#2563eb,#4f46e5); color:#fff; border:none;
             padding:12px 22px; border-radius:11px; font-weight:700; font-size:13.5px; cursor:pointer;
             box-shadow:0 6px 18px rgba(37,99,235,.3); transition:transform .1s; }
  .run-btn:hover:not(:disabled) { transform:translateY(-1px); }
  .run-btn:disabled { opacity:.55; cursor:not-allowed; }

  .stepper { display:flex; padding:13px 24px; background:var(--panel); border-bottom:1px solid var(--line); overflow-x:auto; }
  .step { flex:1; display:flex; flex-direction:column; align-items:center; position:relative; min-width:104px; }
  .step:not(:last-child)::after { content:""; position:absolute; top:18px; left:60%; right:-40%; height:2px; background:var(--line); }
  .step.done:not(:last-child)::after { background:var(--ok); }
  .step .bubble { width:38px; height:38px; border-radius:50%; background:#eef2f7; border:2px solid var(--line);
          display:flex; align-items:center; justify-content:center; font-size:17px; z-index:1; transition:all .3s; color:var(--soft); }
  .step.active .bubble { background:var(--accent); border-color:var(--accent); color:#fff; animation:pulse 1.2s infinite; }
  .step.done .bubble { background:var(--ok); border-color:var(--ok); color:#fff; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 5px rgba(37,99,235,.16);} 50%{box-shadow:0 0 0 10px rgba(37,99,235,.05);} }
  .step .lbl { font-size:11px; font-weight:600; margin-top:7px; text-align:center; color:var(--muted); }
  .step.active .lbl, .step.done .lbl { color:var(--txt); }
  .step .val { font-size:10.5px; color:var(--accent); font-weight:700; margin-top:2px; height:13px; }

  main { display:grid; grid-template-columns:1.45fr 1fr; gap:16px; padding:14px 24px; min-height:0; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow);
          display:flex; flex-direction:column; min-height:0; overflow:hidden; }
  .card > h3 { margin:0; padding:13px 18px; font-size:12px; text-transform:uppercase; letter-spacing:.07em;
          color:var(--muted); border-bottom:1px solid var(--line); display:flex; align-items:center; gap:8px; }

  .mapwrap { position:relative; flex:1; min-height:0; }
  svg { width:100%; height:100%; display:block; }
  .state-path { stroke:#fff; stroke-width:.6px; cursor:pointer; transition:fill .4s, opacity .15s; }
  .state-path:hover { opacity:.85; stroke:#0f1a2e; stroke-width:1.1px; }
  .ph-net { fill:#94a3b8; opacity:.28; }
  .ph-hit { stroke:#fff; stroke-width:.4px; }
  .tooltip { position:absolute; pointer-events:none; background:#0f1a2e; color:#fff; padding:8px 11px; border-radius:9px;
             font-size:12px; box-shadow:0 6px 20px rgba(0,0,0,.25); transform:translate(-50%,-115%); white-space:nowrap;
             opacity:0; transition:opacity .12s; z-index:5; }
  .tooltip.show { opacity:1; }
  .tooltip .tr { color:#9fd0ff; }
  .map-totals { position:absolute; top:14px; right:18px; display:flex; gap:20px; text-align:right; }
  .map-totals .v { font-size:30px; font-weight:800; line-height:1; }
  .map-totals .v.alert { color:var(--lethal); }
  .map-totals .l { font-size:10px; color:var(--muted); text-transform:uppercase; margin-top:3px; }
  .legend { position:absolute; bottom:13px; left:18px; background:rgba(255,255,255,.92); padding:9px 13px;
            border-radius:10px; border:1px solid var(--line); font-size:11px; color:var(--muted); line-height:1.7; }
  .legend .bar { display:inline-block; width:80px; height:8px; border-radius:4px; vertical-align:middle; margin:0 6px;
            background:linear-gradient(90deg,#dbeafe,#3b82f6,#1e3a8a); }
  .legend .ld { display:inline-block; width:9px; height:9px; border-radius:50%; vertical-align:middle; margin:0 5px 0 2px; }

  /* detail stack */
  .stack { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:11px; }
  .rblock { border:1.5px solid var(--line); border-radius:13px; background:var(--panel2); overflow:hidden;
            transition:border-color .3s, box-shadow .3s, background .3s; }
  .rblock.active { border-color:var(--accent); background:#fff; box-shadow:0 0 0 4px rgba(37,99,235,.08); }
  .rhead { display:flex; align-items:center; gap:11px; padding:12px 14px; cursor:pointer; user-select:none; }
  .rdot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
  .rhead-main { flex:1; min-width:0; }
  .rfirm { font-size:13.5px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rmeta { font-size:11px; color:var(--muted); }
  .rhead-right { display:flex; align-items:center; gap:9px; flex-shrink:0; }
  .rsev { color:#fff; font-weight:800; font-size:10.5px; padding:3px 9px; border-radius:6px; letter-spacing:.03em; }
  .rstat { font-size:12px; font-weight:800; color:var(--txt); }
  .rchip { font-size:10.5px; color:var(--accent); font-weight:700; background:rgba(37,99,235,.1); padding:3px 9px; border-radius:6px; }
  .rcaret { font-size:16px; color:var(--soft); width:14px; text-align:center; }
  .rbody { padding:0 12px 12px; display:flex; flex-direction:column; gap:10px; }
  .panel { border:1.5px solid var(--line); border-radius:13px; padding:14px 16px; background:var(--panel2);
           transition:border-color .3s, box-shadow .3s, background .3s; }
  .panel.active { border-color:var(--accent); background:#fff; box-shadow:0 0 0 4px rgba(37,99,235,.08); }
  .panel.idle { opacity:.55; }
  .panel-head { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .panel-ic { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .panel-t { font-size:14px; font-weight:800; }
  .panel-s { font-size:11px; color:var(--muted); }
  .waiting { font-size:12.5px; color:var(--soft); font-style:italic; }
  .kv { font-size:13px; color:var(--muted); margin:3px 0; }
  .kv b { color:var(--txt); }
  .reason-box { background:#fff; border:1px solid var(--line); border-radius:10px; padding:11px 13px; font-size:13px;
                line-height:1.5; color:#334155; margin-top:8px; }
  .sev-badge { display:inline-block; padding:5px 13px; border-radius:8px; color:#fff; font-weight:800; font-size:13px; letter-spacing:.04em; }
  .conf-track { height:9px; background:#eef2f7; border-radius:6px; margin-top:10px; overflow:hidden; }
  .conf-fill { height:100%; border-radius:6px; transition:width .7s ease; }
  .bignum { font-size:46px; font-weight:800; line-height:1; }
  .statrow { display:flex; gap:24px; margin-top:12px; }
  .statrow .v { font-size:23px; font-weight:800; }
  .statrow .l { font-size:11px; color:var(--muted); }
  .phone { max-width:280px; background:#0f1a2e; border-radius:22px; padding:11px; margin:2px 0; }
  .phone .screen { background:#0b1220; border-radius:14px; padding:12px 11px; }
  .bubble-sms { background:#2563eb; color:#fff; padding:9px 12px; border-radius:14px 14px 14px 4px; font-size:12px; line-height:1.5; }
  .rcpt { display:flex; justify-content:space-between; padding:7px 11px; background:#fff; border:1px solid var(--line);
          border-radius:8px; margin-top:7px; font-size:12px; }
  .rcpt .ph2 { color:var(--muted); font-variant-numeric:tabular-nums; }

  footer { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:0 24px 14px; min-height:0; }
  .feed, .logbox { background:var(--panel); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow);
                   overflow:hidden; display:flex; flex-direction:column; max-height:150px; }
  .feed h4, .logbox h4 { margin:0; padding:9px 16px; font-size:11px; text-transform:uppercase; letter-spacing:.06em;
                   color:var(--muted); border-bottom:1px solid var(--line); }
  .feed-scroll, .log-scroll { overflow-y:auto; padding:7px 14px; }
  .feed-item { padding:6px 0; border-bottom:1px solid var(--panel2); font-size:12px; }
  .feed-item .firm { font-weight:700; }
  .feed-item .meta { color:var(--muted); font-size:11px; }
  .log-row { font-size:11.5px; padding:3px 0; display:flex; gap:8px; border-bottom:1px solid var(--panel2); }
  .log-row .tag { color:var(--accent); font-weight:700; white-space:nowrap; min-width:130px; }
  .log-row .rn { color:var(--soft); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/htm@3/dist/htm.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script>
const { useState, useEffect, useRef } = React;
const html = htm.bind(React.createElement);

const STAGES = [
  ["fda_alert","FDA recall","\uD83D\uDCE1"],["ingested","Ingested","\uD83D\uDCE5"],
  ["severity_classified","Severity","\uD83E\uDDE0"],["cohort_identified","Cohort","\uD83C\uDFE5"],
  ["message_drafted","Drafted","\u270D\uFE0F"],["dispatched","Dispatched","\uD83D\uDCE4"],
  ["card_rendered","Alert card","\uD83C\uDFA8"],["cited","Cited","\u2705"],
];
const SEV = { Lethal:"#e5484d", Moderate:"#d97706", Minor:"#2563eb" };
const CARD_OF = { fda_alert:"recall", ingested:"recall", severity_classified:"recall",
  cohort_identified:"cohort", message_drafted:"outreach", dispatched:"outreach",
  card_rendered:"alert", cited:"alert" };

const FIPS_ABBR = {"01":"AL","02":"AK","04":"AZ","05":"AR","06":"CA","08":"CO","09":"CT","10":"DE","11":"DC","12":"FL","13":"GA","15":"HI","16":"ID","17":"IL","18":"IN","19":"IA","20":"KS","21":"KY","22":"LA","23":"ME","24":"MD","25":"MA","26":"MI","27":"MN","28":"MS","29":"MO","30":"MT","31":"NE","32":"NV","33":"NH","34":"NJ","35":"NM","36":"NY","37":"NC","38":"ND","39":"OH","40":"OK","41":"OR","42":"PA","44":"RI","45":"SC","46":"SD","47":"TN","48":"TX","49":"UT","50":"VT","51":"VA","53":"WA","54":"WV","55":"WI","56":"WY"};
const ABBR_NAME = {AL:"Alabama",AK:"Alaska",AZ:"Arizona",AR:"Arkansas",CA:"California",CO:"Colorado",CT:"Connecticut",DE:"Delaware",DC:"District of Columbia",FL:"Florida",GA:"Georgia",HI:"Hawaii",ID:"Idaho",IL:"Illinois",IN:"Indiana",IA:"Iowa",KS:"Kansas",KY:"Kentucky",LA:"Louisiana",ME:"Maine",MD:"Maryland",MA:"Massachusetts",MI:"Michigan",MN:"Minnesota",MS:"Mississippi",MO:"Missouri",MT:"Montana",NE:"Nebraska",NV:"Nevada",NH:"New Hampshire",NJ:"New Jersey",NM:"New Mexico",NY:"New York",NC:"North Carolina",ND:"North Dakota",OH:"Ohio",OK:"Oklahoma",OR:"Oregon",PA:"Pennsylvania",RI:"Rhode Island",SC:"South Carolina",SD:"South Dakota",TN:"Tennessee",TX:"Texas",UT:"Utah",VT:"Vermont",VA:"Virginia",WA:"Washington",WV:"West Virginia",WI:"Wisconsin",WY:"Wyoming"};
const fmt = n => (n||0).toLocaleString();

function CountUp({ value, cls }) {
  const [d,setD]=useState(value||0); const prev=useRef(value||0);
  useEffect(()=>{ const from=prev.current,to=value||0,start=performance.now(),dur=800; let raf;
    const tick=t=>{const p=Math.min(1,(t-start)/dur);const e=1-Math.pow(1-p,3);setD(Math.round(from+(to-from)*e));if(p<1)raf=requestAnimationFrame(tick);};
    raf=requestAnimationFrame(tick); prev.current=to; return ()=>cancelAnimationFrame(raf);},[value]);
  return html`<span class=${cls}>${fmt(d)}</span>`;
}

function USMap({ stateCust, statePharm, network, affected }) {
  const ref=useRef(null), projRef=useRef(null);
  const [ready,setReady]=useState(false);
  const [tip,setTip]=useState({show:false,x:0,y:0,abbr:""});

  useEffect(()=>{
    fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(r=>r.json()).then(us=>{
      const svg=d3.select(ref.current);
      const fc=topojson.feature(us,us.objects.states);
      const proj=d3.geoAlbersUsa().fitSize([760,470],fc); projRef.current=proj;
      const path=d3.geoPath(proj);
      svg.append("g").attr("class","states").selectAll("path").data(fc.features).join("path")
        .attr("class","state-path").attr("d",path).attr("fill","#e8eef5")
        .attr("data-abbr",d=>FIPS_ABBR[String(d.id).padStart(2,"0")]||"")
        .on("mousemove",function(ev){const r=ref.current.getBoundingClientRect();
          setTip({show:true,x:ev.clientX-r.left,y:ev.clientY-r.top,abbr:this.getAttribute("data-abbr")});})
        .on("mouseleave",()=>setTip(t=>({...t,show:false})));
      svg.append("g").attr("class","net");
      svg.append("g").attr("class","hits");
      setReady(true);
    });
  },[]);

  useEffect(()=>{ if(!ready) return;
    const max=Math.max(1,...Object.values(stateCust));
    const scale=d3.scaleSequential(d3.interpolateBlues).domain([0,max*1.15]);
    d3.select(ref.current).select("g.states").selectAll("path.state-path").transition().duration(450)
      .attr("fill",function(){const v=stateCust[this.getAttribute("data-abbr")]||0; return v>0?scale(v):"#e8eef5";});
  },[stateCust,ready]);

  useEffect(()=>{ if(!ready||!network.length||!projRef.current) return;
    const proj=projRef.current;
    const pts=network.map(p=>proj(p)).filter(Boolean);
    d3.select(ref.current).select("g.net").selectAll("circle").data(pts).join("circle")
      .attr("class","ph-net").attr("cx",d=>d[0]).attr("cy",d=>d[1]).attr("r",1.1);
  },[network,ready]);

  useEffect(()=>{ if(!ready||!projRef.current) return;
    const proj=projRef.current;
    const rmax=Math.max(1,...affected.map(p=>p[2]));
    const rs=d3.scaleSqrt().domain([1,rmax]).range([1.6,8]);
    const data=affected.map(p=>{const xy=proj([p[0],p[1]]); return xy?{x:xy[0],y:xy[1],c:p[2],sev:p[3]}:null;}).filter(Boolean);
    const sel=d3.select(ref.current).select("g.hits").selectAll("circle").data(data);
    sel.enter().append("circle").attr("class","ph-hit")
      .attr("cx",d=>d.x).attr("cy",d=>d.y).attr("fill",d=>SEV[d.sev]||"#2563eb")
      .attr("fill-opacity",.85).attr("r",0)
      .transition().duration(550).ease(d3.easeBackOut).attr("r",d=>rs(d.c));
    sel.attr("fill",d=>SEV[d.sev]||"#2563eb").transition().duration(300).attr("r",d=>rs(d.c));
  },[affected,ready]);

  const a=tip.abbr;
  return html`
    <svg ref=${ref} viewBox="0 0 760 470" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="tooltip ${tip.show&&a?"show":""}" style=${{left:tip.x+"px",top:tip.y+"px"}}>
      <b>${ABBR_NAME[a]||a}</b><br/><span class="tr">${fmt(stateCust[a]||0)}</span> customers alerted<br/>
      ${fmt(statePharm[a]||0)} pharmacies</div>`;
}

function Panel({ id, icon, color, title, sub, active, idle, children }) {
  const ref=useRef(null);
  useEffect(()=>{ if(active&&ref.current) ref.current.scrollIntoView({behavior:"smooth",block:"nearest"}); },[active]);
  return html`<div ref=${ref} class="panel ${active?"active":""} ${idle?"idle":""}">
    <div class="panel-head"><div class="panel-ic" style=${{background:(color)+"22",color}}>${icon}</div>
      <div><div class="panel-t">${title}</div><div class="panel-s">${sub}</div></div></div>
    ${children}</div>`;
}

const STATUS = { fda_alert:"Detected", ingested:"Ingested", severity_classified:"Classified",
  cohort_identified:"Matching\u2026", message_drafted:"Drafting\u2026", dispatched:"Dispatched",
  card_rendered:"Rendering\u2026", cited:"Complete" };

function RecallBlock({ rec, isActive, activeCard }) {
  const [open,setOpen]=useState(isActive);
  const ref=useRef(null);
  useEffect(()=>{ setOpen(isActive);
    if(isActive&&ref.current) ref.current.scrollIntoView({behavior:"smooth",block:"start"}); },[isActive]);
  const sev=SEV[rec.severity]||"#94a3b8";
  const ac = c => isActive && activeCard===c;
  return html`<div ref=${ref} class="rblock ${isActive?"active":""}">
    <div class="rhead" onClick=${()=>setOpen(o=>!o)}>
      <span class="rdot" style=${{background:sev}}></span>
      <div class="rhead-main">
        <div class="rfirm">${rec.firm||"Incoming recall\u2026"}</div>
        <div class="rmeta">${rec.recall_number}${rec.ndc?" \u00b7 NDC "+rec.ndc:""}</div>
      </div>
      <div class="rhead-right">
        ${rec.severity?html`<span class="rsev" style=${{background:sev}}>${rec.severity}</span>`:""}
        ${rec.dispatch?html`<span class="rstat">${fmt(rec.dispatch.count)} alerts</span>`
                      :html`<span class="rchip">${STATUS[rec.stage]||"\u2026"}</span>`}
        <span class="rcaret">${open?"\u2212":"+"}</span>
      </div>
    </div>
    ${open?html`<div class="rbody">
      <${Panel} icon="\uD83D\uDCE1" color="#e5484d" title="Recall under review" sub="openFDA enforcement record"
          active=${ac("recall")} idle=${!rec.firm}>
        ${rec.firm ? html`<div>
          <div class="kv">Firm: <b>${rec.firm}</b></div>
          <div class="reason-box">${rec.reason}</div>
          ${rec.severity ? html`<div style=${{marginTop:"12px"}}>
            <span class="sev-badge" style=${{background:sev}}>${rec.severity}</span>
            <div class="conf-track"><div class="conf-fill" style=${{width:Math.round((rec.confidence||0)*100)+"%",background:sev}}></div></div>
            <div class="kv" style=${{marginTop:"5px"}}>ML confidence <b>${Math.round((rec.confidence||0)*100)}%</b> \u00b7 TF-IDF\u2192SVD\u2192LogReg</div>
          </div>` : html`<div class="kv" style=${{marginTop:"8px"}}>Classifying severity\u2026</div>`}
        </div>` : html`<div class="waiting">Waiting for recall details\u2026</div>`}
      </${Panel}>

      <${Panel} icon="\uD83C\uDFE5" color="#7c3aed" title="Patients matched nationwide" sub="join across 1,000,000 records"
          active=${ac("cohort")} idle=${!rec.cohort}>
        ${rec.cohort ? html`<div>
          <span class="bignum" style=${{color:sev}}><${CountUp} value=${rec.cohort.customers} /></span>
          <div class="kv">customers on this recalled medication</div>
          <div class="statrow">
            <div><div class="v"><${CountUp} value=${rec.cohort.states} /></div><div class="l">states</div></div>
            <div><div class="v"><${CountUp} value=${rec.cohort.pharmacies} /></div><div class="l">pharmacies</div></div>
          </div></div>` : html`<div class="waiting">Awaiting cohort match\u2026</div>`}
      </${Panel}>

      <${Panel} icon="\uD83D\uDCE4" color="#16a34a" title="Emergency outreach" sub="severity-aware dispatch"
          active=${ac("outreach")} idle=${!rec.message}>
        ${rec.message ? html`<div>
          <div class="phone"><div class="screen"><div class="bubble-sms">${rec.message}</div></div></div>
          ${rec.dispatch ? html`<div style=${{marginTop:"10px"}}>
            <span class="bignum" style=${{fontSize:"34px",color:"#16a34a"}}><${CountUp} value=${rec.dispatch.count} /></span>
            <span class="kv"> alerts sent via ${rec.dispatch.channel}</span>
            ${(rec.dispatch.samples||[]).map((r,i)=>html`<div class="rcpt" key=${i}>
              <span>${r.name} \u00b7 ${r.state}</span><span class="ph2">${r.phone}</span></div>`)}
          </div>` : html`<div class="kv" style=${{marginTop:"8px"}}>Dispatching\u2026</div>`}
        </div>` : html`<div class="waiting">Drafting outreach message\u2026</div>`}
      </${Panel}>

      <${Panel} icon="\uD83C\uDFA8" color="#2563eb" title="OpenUI alert card" sub=${"generated at runtime \u00b7 "+(rec.cardBy||"")}
          active=${ac("alert")} idle=${!rec.cardHtml}>
        ${rec.cardHtml ? html`<div dangerouslySetInnerHTML=${{__html:rec.cardHtml}}></div>`
                       : html`<div class="waiting">Generating alert card\u2026</div>`}
      </${Panel}>
    </div>`:""}
  </div>`;
}

function RecallList({ recalls, activeRn, activeCard }) {
  if (!recalls.length) return html`<div class="stack"><div class="waiting" style=${{padding:"40px 10px",textAlign:"center"}}>
    Click <b>Launch live defense</b> to watch SafetyNet protect patients - one recall at a time.</div></div>`;
  return html`<div class="stack">
    ${recalls.map(r=>html`<${RecallBlock} key=${r.recall_number} rec=${r}
        isActive=${r.recall_number===activeRn} activeCard=${activeCard} />`)}
  </div>`;
}

function App() {
  const [stats,setStats]=useState(null);
  const [running,setRunning]=useState(false);
  const [curStage,setCurStage]=useState(null);
  const [doneStages,setDoneStages]=useState({});
  const [recalls,setRecalls]=useState([]);
  const [activeRn,setActiveRn]=useState(null);
  const [stepVals,setStepVals]=useState({});
  const [stateCust,setStateCust]=useState({});
  const [statePharm,setStatePharm]=useState({});
  const [affected,setAffected]=useState([]);
  const [network,setNetwork]=useState([]);
  const [totals,setTotals]=useState({customers:0,pharmacies:0,states:new Set()});
  const [feed,setFeed]=useState([]);
  const [log,setLog]=useState([]);

  useEffect(()=>{
    fetch("/api/stats").then(r=>r.json()).then(setStats);
    fetch("/api/pharmacies").then(r=>r.json()).then(setNetwork);
    const proto=location.protocol==="https:"?"wss":"ws";
    const ws=new WebSocket(`${proto}://${location.host}/stream`);
    ws.onmessage=e=>handle(JSON.parse(e.data));
    return ()=>ws.close();
  },[]);

  function handle(ev){
    const {stage,recall_number,payload}=ev;
    if (stage==="run_started"){ setRunning(true); setStateCust({}); setStatePharm({}); setAffected([]);
      setDoneStages({}); setStepVals({}); setTotals({customers:0,pharmacies:0,states:new Set()});
      setFeed([]); setRecalls([]); setActiveRn(null); setCurStage(null); return; }
    if (stage==="run_complete"){ setRunning(false); setCurStage(null); return; }

    setCurStage(stage);
    setActiveRn(recall_number);
    const idx=STAGES.findIndex(s=>s[0]===stage);
    setDoneStages(prev=>{const n=stage==="fda_alert"?{}:{...prev};STAGES.forEach((s,i)=>{if(i<idx)n[s[0]]=true;});return n;});

    setRecalls(prev=>{
      const list=[...prev];
      const i=list.findIndex(r=>r.recall_number===recall_number);
      const r=i>=0?{...list[i]}:{recall_number};
      r.stage=stage;
      if(stage==="fda_alert"){r.firm=payload.recalling_firm;r.ndc=payload.product_ndc;r.reason=payload.reason_for_recall;}
      if(stage==="severity_classified"){r.severity=payload.severity;r.confidence=payload.confidence;}
      if(stage==="cohort_identified")r.cohort={customers:payload.total_customers,states:payload.total_states,pharmacies:payload.total_pharmacies};
      if(stage==="message_drafted")r.message=payload.message;
      if(stage==="dispatched")r.dispatch={count:payload.dispatched,channel:payload.channel,samples:payload.sample_recipients};
      if(stage==="card_rendered"){r.cardHtml=payload.html;r.cardBy=payload.generated_by;}
      if(i>=0){list[i]=r;return list;}
      return [r,...list];
    });

    setStepVals(prev=>{const v={...prev};
      if(stage==="severity_classified")v[stage]=payload.severity;
      if(stage==="cohort_identified")v[stage]=fmt(payload.total_customers);
      if(stage==="dispatched")v[stage]=fmt(payload.dispatched)+" sent";
      return v;});

    if(stage==="fda_alert")
      setFeed(prev=>[{rn:recall_number,firm:payload.recalling_firm,ndc:payload.product_ndc},...prev].slice(0,10));
    if(stage==="cohort_identified"){
      setStateCust(prev=>{const n={...prev};(payload.by_state||[]).forEach(s=>{n[s.state]=(n[s.state]||0)+s.customers;});return n;});
      setStatePharm(prev=>{const n={...prev};(payload.by_state||[]).forEach(s=>{n[s.state]=(n[s.state]||0)+s.pharmacies;});return n;});
      setTotals(prev=>{const st=new Set(prev.states);(payload.by_state||[]).forEach(s=>st.add(s.state));return {...prev,states:st};});
      const sev=payload.severity;
      setAffected(prev=>[...prev,...(payload.pharmacy_points||[]).map(p=>[p[0],p[1],p[2],sev])].slice(-4000));
    }
    if(stage==="dispatched")
      setTotals(prev=>({customers:prev.customers+payload.dispatched,pharmacies:prev.pharmacies+payload.pharmacies_notified,states:prev.states}));

    setLog(prev=>[{stage,rn:recall_number,t:Date.now()},...prev].slice(0,60));
  }

  async function launch(){ setRunning(true); await fetch("/api/run?limit=8",{method:"POST"}); }
  const activeCard=CARD_OF[curStage]||null;

  return html`
  <div class="app">
    <header>
      <div><div class="logo">FDA <span class="shield">SafetyNet</span></div>
        <div class="tagline">Autonomous nationwide drug-recall defense</div></div>
      <div class="stats">${stats&&[["Recalls indexed",stats.total_recalls],["Patients indexed",stats.total_customers_indexed],
        ["Pharmacies",stats.total_pharmacies],["Matches",stats.total_alerts]].map(([l,v])=>html`
        <div class="stat" key=${l}><div class="v">${fmt(v)}</div><div class="l">${l}</div></div>`)}</div>
      <button class="run-btn" onClick=${launch} disabled=${running}>
        ${running?"\u25CF Defense running\u2026":"\u25B6 Launch live defense"}</button>
    </header>

    <div class="stepper">${STAGES.map(([id,lbl,icon])=>{
      const cls=curStage===id?"active":doneStages[id]?"done":"";
      return html`<div class="step ${cls}" key=${id}>
        <div class="bubble">${doneStages[id]&&curStage!==id?"\u2713":icon}</div>
        <div class="lbl">${lbl}</div><div class="val">${stepVals[id]||""}</div></div>`;})}</div>

    <main>
      <div class="card">
        <h3>\uD83D\uDDFA\uFE0F Nationwide alert fan-out</h3>
        <div class="mapwrap">
          <${USMap} stateCust=${stateCust} statePharm=${statePharm} network=${network} affected=${affected} />
          <div class="map-totals">
            <div><div class="v alert"><${CountUp} value=${totals.customers} /></div><div class="l">Customers alerted</div></div>
            <div><div class="v">${totals.states.size}</div><div class="l">States</div></div>
            <div><div class="v"><${CountUp} value=${totals.pharmacies} /></div><div class="l">Pharmacies</div></div>
          </div>
          <div class="legend">
            <div>State shade<span class="bar"></span>customers per state</div>
            <div>Dots = affected pharmacies (size = customers reached)
              <span class="ld" style=${{background:"#e5484d"}}></span>Lethal
              <span class="ld" style=${{background:"#d97706"}}></span>Moderate
              <span class="ld" style=${{background:"#2563eb"}}></span>Minor</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>\uD83D\uDD0E Live action ${recalls.length?"\u00b7 "+recalls.length+" recalls processed":""}</h3>
        <${RecallList} recalls=${recalls} activeRn=${activeRn} activeCard=${activeCard} />
      </div>
    </main>

    <footer>
      <div class="feed"><h4>Recall feed</h4><div class="feed-scroll">
        ${feed.length===0&&html`<div style=${{color:"#94a3b8",fontSize:"12px",padding:"6px"}}>Recalls appear here as detected.</div>`}
        ${feed.map((f,i)=>html`<div class="feed-item" key=${i}><div class="firm">${f.firm}</div>
          <div class="meta">${f.rn} \u00b7 NDC ${f.ndc}</div></div>`)}</div></div>
      <div class="logbox"><h4>Event stream</h4><div class="log-scroll">
        ${log.map((r,i)=>html`<div class="log-row" key=${i}><span class="tag">${r.stage}</span><span class="rn">${r.rn}</span></div>`)}</div></div>
    </footer>
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
